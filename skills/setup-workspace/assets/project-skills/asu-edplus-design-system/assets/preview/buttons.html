<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons — Primary & Secondary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: #fff; font-family: Arial, sans-serif; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .btn { border: 0; font-family: Arial, sans-serif; font-weight: 700; cursor: pointer; border-radius: 9999px; padding: 12px 24px; font-size: 14px; }
  .btn.sm { padding: 8px 16px; font-size: 13px; }
  .btn.lg { padding: 16px 32px; font-size: 16px; }
  .prim { background: #8C1D40; color: #fff; }
  .prim:hover { background: #7A1838; }
  .sec { background: transparent; color: #8C1D40; border: 2px solid #8C1D40; padding: 10px 22px; }
  .sec.sm { padding: 6px 14px; }
  .sec.lg { padding: 14px 30px; }
  .sec:hover { background: #8C1D40; color: #fff; }
  .dis { background: #D0D0D0; color: #4D4D4D; cursor: not-allowed; }
  .lbl { font-size: 11px; color: #4D4D4D; font-family: ui-monospace, Menlo, monospace; width: 80px; }
</style></head><body>
<div class="row"><div class="lbl">Primary</div><button class="btn prim sm">Small</button><button class="btn prim">Start course</button><button class="btn prim lg">Submit application</button></div>
<div class="row"><div class="lbl">Secondary</div><button class="btn sec sm">Small</button><button class="btn sec">Learn more</button><button class="btn sec lg">See programs</button></div>
<div class="row"><div class="lbl">Disabled</div><button class="btn dis" disabled aria-disabled="true">Continue</button></div>
</body></html>
