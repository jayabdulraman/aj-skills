<!doctype html>
<html><head><meta charset="utf-8"><title>Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: #fff; }
  .row { display: grid; grid-template-columns: 80px 1fr 90px; gap: 10px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #E8E8E8; }
  .tag { font-size: 11px; color: #4D4D4D; font-family: ui-monospace, Menlo, monospace; }
  .meta { font-size: 10px; color: #747474; text-align: right; font-family: ui-monospace, Menlo, monospace; }
  .spec { line-height: 1.15; letter-spacing: -0.035em; font-weight: 700; }
</style></head><body>
<div class="row"><div class="tag">H1</div><div class="spec" style="font-size:34px">Start your degree</div><div class="meta">48 / 700</div></div>
<div class="row"><div class="tag">H2</div><div class="spec" style="font-size:26px">Start your degree</div><div class="meta">36 / 700</div></div>
<div class="row"><div class="tag">H3</div><div class="spec" style="font-size:20px">Start your degree</div><div class="meta">28 / 700</div></div>
<div class="row"><div class="tag">H4</div><div class="spec" style="font-size:17px">Start your degree</div><div class="meta">22 / 700</div></div>
<div class="row"><div class="tag">H5</div><div class="spec" style="font-size:14px">Start your degree</div><div class="meta">18 / 700</div></div>
</body></html>
