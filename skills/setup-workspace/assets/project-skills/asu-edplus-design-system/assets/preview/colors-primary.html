<!doctype html>
<html><head><meta charset="utf-8"><title>Primary Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .sw { display: flex; gap: 12px; align-items: center; padding: 10px; border: 1px solid var(--border-default); }
  .chip { width: 56px; height: 56px; flex: 0 0 56px; }
  .meta .name { font-weight: 700; font-size: 14px; color: var(--fg-1); }
  .meta .hex { font-size: 12px; color: var(--fg-2); font-family: ui-monospace, Menlo, monospace; margin-top: 2px; }
  .meta .use { font-size: 11px; color: var(--fg-3); margin-top: 4px; }
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#8C1D40"></div><div class="meta"><div class="name">ASU Maroon</div><div class="hex">#8C1D40</div><div class="use">Primary CTAs, header, active nav</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFC627"></div><div class="meta"><div class="name">ASU Gold</div><div class="hex">#FFC627</div><div class="use">Accent only — never dominant</div></div></div>
  <div class="sw"><div class="chip" style="background:#191919"></div><div class="meta"><div class="name">Gray 1 (fn. black)</div><div class="hex">#191919</div><div class="use">Body text, headings</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF; border:1px solid #D0D0D0"></div><div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div><div class="use">Page bg, text on maroon</div></div></div>
</div>
</body></html>
