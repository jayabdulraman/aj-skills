<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: #fff; font-family: Arial, sans-serif; }
  .row { display: grid; grid-template-columns: 90px 1fr 60px; gap: 12px; align-items: center; padding: 6px 0; }
  .tok { font-family: ui-monospace, Menlo, monospace; font-size: 12px; font-weight: 700; }
  .bar { background: #8C1D40; height: 12px; }
  .px { font-size: 11px; color: #4D4D4D; text-align: right; font-family: ui-monospace, Menlo, monospace; }
</style></head><body>
<div class="row"><div class="tok">--space-1</div><div><div class="bar" style="width:4px"></div></div><div class="px">4</div></div>
<div class="row"><div class="tok">--space-2</div><div><div class="bar" style="width:8px"></div></div><div class="px">8</div></div>
<div class="row"><div class="tok">--space-3</div><div><div class="bar" style="width:16px"></div></div><div class="px">16</div></div>
<div class="row"><div class="tok">--space-4</div><div><div class="bar" style="width:24px"></div></div><div class="px">24</div></div>
<div class="row"><div class="tok">--space-5</div><div><div class="bar" style="width:32px"></div></div><div class="px">32</div></div>
<div class="row"><div class="tok">--space-6</div><div><div class="bar" style="width:48px"></div></div><div class="px">48</div></div>
<div class="row"><div class="tok">--space-7</div><div><div class="bar" style="width:64px"></div></div><div class="px">64</div></div>
<div class="row"><div class="tok">--space-8</div><div><div class="bar" style="width:96px"></div></div><div class="px">96</div></div>
</body></html>
