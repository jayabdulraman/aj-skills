<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: #fff; font-family: Arial, sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .tile { text-align: center; }
  .shape { margin: 0 auto 8px; background: #8C1D40; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
  .sq { width: 100%; height: 72px; border-radius: 0; }
  .pill { height: 44px; width: 140px; border-radius: 9999px; }
  .circ { width: 72px; height: 72px; border-radius: 50%; }
  .lbl { font-size: 12px; font-weight: 700; }
  .val { font-size: 11px; color: #747474; font-family: ui-monospace, Menlo, monospace; }
  .use { font-size: 11px; color: #4D4D4D; margin-top: 2px; }
</style></head><body>
<div class="grid">
  <div class="tile"><div class="shape sq">Card / input / modal</div><div class="lbl">Sharp</div><div class="val">radius: 0</div><div class="use">Default for containers</div></div>
  <div class="tile"><div class="shape pill">Button</div><div class="lbl">Pill</div><div class="val">radius: 9999px</div><div class="use">All button sizes</div></div>
  <div class="tile"><div class="shape circ">Icon</div><div class="lbl">Circle</div><div class="val">radius: 50%</div><div class="use">Decorative icon/step containers</div></div>
</div>
</body></html>
